# ============================================
# VietNet2026 — PRODUCTION (Shared VPS)
# Domain: bhquan.store
# Dung chung MySQL (shared-mysql), Redis (shared-redis), Nginx (shared-nginx)
# tu /opt/infra/docker-compose.yml
# ============================================

services:

  # ─── NestJS Backend ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietnet-api
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_PORT: 4000
      DB_HOST: shared-mysql
      DB_PORT: 3306
      DB_NAME: vietnet
      DB_USER: vietnet
      DB_PASS: ${VIETNET_DB_PASSWORD}
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "vn:"
      APP_URL: https://bhquan.store
      API_URL: https://bhquan.store/api
      CORS_ORIGINS: https://bhquan.store
      CRON_SECRET: ${CRON_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    ports:
      - '127.0.0.1:4100:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - webphoto_backend
      - vietnet_frontend

  # ─── Next.js Frontend ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SITE_URL: https://bhquan.store
    container_name: vietnet-frontend
    restart: always
    ports:
      - '127.0.0.1:3100:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SITE_URL: https://bhquan.store
      INTERNAL_API_URL: http://vietnet-api:4000/api
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - vietnet_frontend

networks:
  # Network rieng — shared-nginx join vao de proxy
  vietnet_frontend:
    name: vietnet_frontend
    external: true
  # Network chung — truy cap shared-mysql + shared-redis
  webphoto_backend:
    name: webphoto_backend
    external: true
