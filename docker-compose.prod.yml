# ============================================
# VietNet Interior — PRODUCTION
# Chạy cùng VPS với WebPhoto (bhquan.site)
# Dùng chung MySQL (photo-mysql) + Redis (photo-redis) của WebPhoto
# Domain: bhquan.store
# Ports: 4100 (API), 3100 (SSR)
# ============================================

services:

  # ─── NestJS API Server ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietnet-api
    restart: always
    ports:
      - '4100:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: photo-mysql
      DB_PORT: 3306
      DB_USERNAME: vietnet
      DB_PASSWORD: ${VIETNET_DB_PASSWORD}
      DB_NAME: vietnet
      REDIS_HOST: photo-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 3600
      REFRESH_TOKEN_EXPIRATION: 604800
      ALLOWED_ORIGINS: https://${DOMAIN:-bhquan.store}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET_PRIVATE: vietnet-private
      R2_BUCKET_PUBLIC: vietnet-public
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: admin@${DOMAIN:-bhquan.store}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NEXT_REVALIDATE_URL: http://vietnet-frontend:3000
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - webphoto_backend
      - frontend

  # ─── Next.js SSR Frontend ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vietnet-frontend
    restart: always
    ports:
      - '3100:3000'
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-bhquan.store}/api
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN:-bhquan.store}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend

networks:
  # Join network của WebPhoto để access photo-mysql + photo-redis
  webphoto_backend:
    external: true
    name: webphoto_backend
  frontend:
