# ──────────────────────────────────────────
# Rate limiting zones
# ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

# ──────────────────────────────────────────
# Micro-cache for public API GET requests
# ──────────────────────────────────────────
proxy_cache_path /var/cache/nginx/api_cache
    levels=1:2
    keys_zone=api_cache:10m
    max_size=100m
    inactive=1m
    use_temp_path=off;

# ──────────────────────────────────────────
# Upstream definitions
# ──────────────────────────────────────────
upstream backend {
    server backend:4000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ──────────────────────────────────────────
# Server block
# ──────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security headers ──────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # NOTE: Content-Security-Policy duoc set boi Next.js middleware (frontend/src/middleware.ts)
    # voi nonce ngau nhien moi request — khong the set o tang nginx vi nginx khong biet nonce.
    # Backend API (JSON) dung CSP toi thieu set boi Helmet (backend/src/main.ts).

    # ── Nginx health check ────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── Auth endpoints (stricter rate limit, no cache) ──
    location ~ ^/api/(auth|login|register|refresh) {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # No caching for auth endpoints
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── Upload endpoints (file size aware) ──
    location ~ ^/api/.*/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 20M;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Next.js API routes (draft, revalidate) → Frontend ──
    location ~ ^/api/(draft|revalidate)(/|$) {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── API endpoints (with micro-cache for GET) ──
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Micro-cache: 1s TTL for GET requests only
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 1s;
        proxy_cache_key "$request_method$request_uri";

        # Bypass cache when Authorization header is present
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;

        # Bypass cache when response has Set-Cookie
        proxy_no_cache $upstream_http_set_cookie;
        proxy_cache_bypass $upstream_http_set_cookie;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Socket.io (WebSocket upgrade) ──
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend (Next.js SSR) ──
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Next.js HMR WebSocket (dev only, harmless in prod) ──
    location /_next/webpack-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets caching ──
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
