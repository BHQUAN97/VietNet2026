# ──────────────────────────────────────────
# VietNet Interior — Nginx config cho shared-nginx (Docker)
# Đặt tại: /opt/webphoto/nginx/conf.d/bhquan.store.conf
#
# Nginx chạy trong Docker container shared-nginx,
# proxy qua Docker network (container name), KHÔNG dùng localhost
# ──────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name bhquan.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name bhquan.store;

    ssl_certificate     /etc/letsencrypt/live/bhquan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bhquan.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Docker DNS resolver — dynamic resolution, nginx không crash khi container chưa up
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── Auth endpoints ───────────────────
    location ~ ^/api/(auth|login|register|refresh) {
        set $vietnet_api http://vietnet-api:4000;
        proxy_pass $vietnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── Upload endpoints ─────────────────
    location ~ ^/api/.*/upload {
        client_max_body_size 20m;
        set $vietnet_api http://vietnet-api:4000;
        proxy_pass $vietnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ─── Local uploads (static files) ────
    location /uploads/ {
        set $vietnet_api http://vietnet-api:4000;
        proxy_pass $vietnet_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public";
    }

    # ─── Next.js API routes (draft, revalidate) → Next.js ──
    location ~ ^/api/(draft|revalidate)(/|$) {
        set $vietnet_fe http://vietnet-frontend:3000;
        proxy_pass $vietnet_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── API proxy → NestJS ───────────────
    location /api/ {
        set $vietnet_api http://vietnet-api:4000;
        proxy_pass $vietnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Socket.io (WebSocket) ────────────
    location /socket.io/ {
        set $vietnet_api http://vietnet-api:4000;
        proxy_pass $vietnet_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Next.js static assets (immutable) ─
    location /_next/static/ {
        set $vietnet_fe http://vietnet-frontend:3000;
        proxy_pass $vietnet_fe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js ───────────
    location / {
        set $vietnet_fe http://vietnet-frontend:3000;
        proxy_pass $vietnet_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
