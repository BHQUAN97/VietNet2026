# ──────────────────────────────────────────
# VietNet Interior — Host Nginx (BT Panel)
# Đặt tại: /www/server/panel/vhost/nginx/bhquan.store.conf
# Hoặc:    /etc/nginx/conf.d/bhquan.store.conf
#
# Khác WebPhoto: Frontend là Next.js SSR (proxy :3100),
# không phải SPA static files
# ──────────────────────────────────────────

# Rate limiting
limit_req_zone $binary_remote_addr zone=vietnet_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=vietnet_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=vietnet_upload:10m rate=5r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name bhquan.store www.bhquan.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name bhquan.store www.bhquan.store;

    ssl_certificate /etc/letsencrypt/live/bhquan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bhquan.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:VietNetSSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Auth endpoints (rate limited) ────
    location ~ ^/api/(auth|login|register|refresh) {
        limit_req zone=vietnet_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── Upload endpoints ─────────────────
    location ~ ^/api/.*/upload {
        limit_req zone=vietnet_upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ─── API proxy → NestJS :4100 ─────────
    location /api/ {
        limit_req zone=vietnet_api burst=50 nodelay;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Socket.io (WebSocket) ────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ─── Next.js static assets (immutable) ─
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js :3100 ─────
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
