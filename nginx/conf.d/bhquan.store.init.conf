# ============================================
# TEMP CONFIG — Dung khi chua co SSL certificate
# Sau khi co SSL, CI tu dong switch sang bhquan.store.conf
# ============================================

server {
    listen 80;
    server_name bhquan.store;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy → NestJS
    location /api/ {
        proxy_pass http://vietnet-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://vietnet-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Local uploads
    location /uploads/ {
        proxy_pass http://vietnet-api:4000;
        expires 30d;
    }

    # Frontend SSR → Next.js
    location / {
        proxy_pass http://vietnet-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
