name: Scheduled Tasks

on:
  schedule:
    - cron: '0 18 * * *'   # 1:00 AM UTC+7 — traffic sync
    - cron: '0 19 * * *'   # 2:00 AM UTC+7 — cleanup expired sessions

jobs:
  traffic-sync:
    if: github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Run traffic sync cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP=$(curl -s -o /tmp/resp -w '%{http_code}' --max-time 30 -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "https://bhquan.store/api/cron/traffic-sync")
          BODY=$(cat /tmp/resp 2>/dev/null)
          echo "HTTP: $HTTP | Body: $BODY"
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || { echo "::error::traffic-sync failed HTTP $HTTP: $BODY"; exit 1; }

  cleanup-sessions:
    if: github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup expired sessions
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP=$(curl -s -o /tmp/resp -w '%{http_code}' --max-time 30 -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "https://bhquan.store/api/cron/cleanup-sessions")
          BODY=$(cat /tmp/resp 2>/dev/null)
          echo "HTTP: $HTTP | Body: $BODY"
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || { echo "::error::cleanup-sessions failed HTTP $HTTP: $BODY"; exit 1; }
