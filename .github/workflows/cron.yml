name: Scheduled Tasks

on:
  schedule:
    - cron: '0 18 * * *'   # 1:00 AM UTC+7 — traffic sync
    - cron: '0 19 * * *'   # 2:00 AM UTC+7 — cleanup expired sessions

jobs:
  traffic-sync:
    if: false  # TEMP: disabled — fix CRON_SECRET on server first
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run traffic sync cron
        run: |
          source config/env
          curl -f -s --max-time 30 -X POST -H "x-cron-secret: ${CRON_SECRET}" \
            "${API_URL}/api/cron/traffic-sync"

  cleanup-sessions:
    if: github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cleanup expired sessions
        run: |
          source config/env
          curl -f -s --max-time 30 -X POST -H "x-cron-secret: ${CRON_SECRET}" \
            "${API_URL}/api/cron/cleanup-sessions"
