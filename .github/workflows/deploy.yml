name: Auto Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/cron.yml'
      - '.github/workflows/restore.yml'
      - '.github/workflows/vps-setup.yml'

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  APP_DIR: /opt/vietnet
  WEBPHOTO_DIR: /opt/webphoto

# ══════════════════════════════════════════════════════
# Pipeline: typecheck → build → deploy → verify
# ══════════════════════════════════════════════════════

jobs:
  # ─── STAGE 1: TYPE CHECK (parallel) ──────────────
  typecheck-fe:
    name: "1. Typecheck FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: "1. Typecheck BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  # ─── STAGE 2: DETECT + BUILD ─────────────────────
  build:
    name: "2. Detect & Build"
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      fe: ${{ steps.changes.outputs.fe }}
      be: ${{ steps.changes.outputs.be }}
      infra: ${{ steps.changes.outputs.infra }}
      db: ${{ steps.changes.outputs.db }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Load config/env
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            [[ "$line" == *=* ]] && echo "$line" >> $GITHUB_ENV
          done < config/env
          PASS=$(sed -n 's/^VPS_PASSWORD=//p' config/env)
          echo "SSHPASS=${PASS}" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.VPS_PORT }} -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Detect deploy mode
        id: detect
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          if sshpass -e ssh -p $PORT $VPS "test -f ${APP_DIR}/docker-compose.prod.yml"; then
            echo "mode=update" >> $GITHUB_OUTPUT
            echo "Deploy mode: UPDATE"
          else
            echo "mode=init" >> $GITHUB_OUTPUT
            echo "Deploy mode: INIT (first-time)"
          fi

      - name: Detect changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            DIFF="FULL"
          else
            DIFF=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo "FULL")
          fi
          echo "Changed files:"
          echo "$DIFF" | head -20

          fe=false; be=false; infra=false; db=false; config=false
          if [ "$DIFF" = "FULL" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          else
            echo "$DIFF" | grep -qE '^frontend/' && fe=true
            echo "$DIFF" | grep -qE '^backend/' && be=true
            echo "$DIFF" | grep -qE '^(docker-compose|infra/|nginx/|.*/Dockerfile)' && infra=true
            echo "$DIFF" | grep -qE '^(db/|backend/src/.*entity)' && db=true
            echo "$DIFF" | grep -qE '^config/' && config=true
          fi
          if [ "${{ steps.detect.outputs.mode }}" = "init" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          fi

          echo "fe=$fe" >> $GITHUB_OUTPUT
          echo "be=$be" >> $GITHUB_OUTPUT
          echo "infra=$infra" >> $GITHUB_OUTPUT
          echo "db=$db" >> $GITHUB_OUTPUT
          echo "config=$config" >> $GITHUB_OUTPUT
          echo "Changes: fe=$fe be=$be infra=$infra db=$db config=$config"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Backend
        if: steps.changes.outputs.be == 'true'
        run: cd backend && npm ci && npm run build

      - name: Build Frontend
        if: steps.changes.outputs.fe == 'true'
        run: cd frontend && npm ci && npm run build

  # ─── STAGE 3: DEPLOY TO VPS ─────────────────────
  deploy:
    name: "3. Deploy"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Load config/env
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            [[ "$line" == *=* ]] && echo "$line" >> $GITHUB_ENV
          done < config/env
          PASS=$(sed -n 's/^VPS_PASSWORD=//p' config/env)
          echo "SSHPASS=${PASS}" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.VPS_PORT }} -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - uses: actions/setup-node@v4
        if: needs.build.outputs.fe == 'true' || needs.build.outputs.be == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Backend (local)
        if: needs.build.outputs.be == 'true'
        run: cd backend && npm ci && npm run build

      - name: Build Frontend (local)
        if: needs.build.outputs.fe == 'true'
        run: cd frontend && npm ci && npm run build

      # ── INIT: Full upload ────────────────────────
      - name: "[INIT] Upload full project"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/{backend,frontend,nginx/conf.d,scripts,db,config}"
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e scp -P $PORT .env.example $VPS:${APP_DIR}/

          echo "  Uploading backend..."
          tar czf - backend/src backend/dist backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading frontend..."
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading nginx + db + scripts..."
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${WEBPHOTO_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: "[INIT] Start shared infra"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "
            echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env && chmod 600 ${INFRA_DIR}/.env
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true
            docker rm -f photo-mysql photo-redis 2>/dev/null || true
            cd ${INFRA_DIR} && docker compose up -d 2>&1
            for i in \$(seq 1 60); do
              docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && { echo 'MySQL ready!'; break; }
              [ \$i -eq 60 ] && { echo 'ERROR: MySQL not ready'; docker logs shared-mysql --tail 20; exit 1; }
              sleep 1
            done
          "

      - name: "[INIT] Create DB + user"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "docker exec -i shared-mysql mysql -u root -p'${MYSQL_ROOT_PWD}' <<EOSQL
            CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'vietnet'@'%' IDENTIFIED BY '${VIETNET_DB_PWD}';
            GRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%';
            FLUSH PRIVILEGES;
          EOSQL"

      - name: "[INIT] SSL certs"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          HAS_WP=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          [ "$HAS_WP" != "yes" ] && { echo "WebPhoto not deployed — skip SSL"; exit 0; }
          sshpass -e ssh -p $PORT $VPS "
            cd ${WEBPHOTO_DIR}
            for DOMAIN in bhquan.store; do
              CERT_EXISTS=\$(docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot \
                test -f /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem 2>/dev/null && echo yes || echo no)
              if [ \"\$CERT_EXISTS\" = 'no' ]; then
                docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c \"
                  mkdir -p /etc/letsencrypt/live/\${DOMAIN}
                  openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                    -keyout /etc/letsencrypt/live/\${DOMAIN}/privkey.pem \
                    -out /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem \
                    -subj '/CN=\${DOMAIN}' 2>/dev/null
                \"
              fi
            done
          "

      - name: "[INIT] Build & Start services"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend frontend 2>&1")
          if [ $? -ne 0 ]; then
            echo "::error::Docker build failed"; echo "$BUILD_OUT" | tail -30; exit 1
          fi
          START_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d 2>&1")
          if [ $? -ne 0 ]; then
            echo "::error::Docker start failed"; echo "$START_OUT"
            sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared'" 2>&1
            sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 30 2>&1"
            exit 1
          fi
          sshpass -e ssh -p $PORT $VPS "
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      - name: "[INIT] Get real SSL cert"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          HAS_WP=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          [ "$HAS_WP" != "yes" ] && exit 0
          sshpass -e ssh -p $PORT $VPS "
            cd ${WEBPHOTO_DIR}
            DC='docker compose -f docker-compose.prod.yml'
            \$DC run --rm --entrypoint '' certbot sh -c \
              'rm -rf /etc/letsencrypt/live/bhquan.store* /etc/letsencrypt/archive/bhquan.store* /etc/letsencrypt/renewal/bhquan.store*.conf'
            timeout 120 \$DC run --rm --entrypoint '' certbot \
              certbot certonly --webroot -w /var/www/certbot \
              --non-interactive --cert-name bhquan.store \
              --email admin@bhquan.site --agree-tos --no-eff-email \
              -d bhquan.store -d www.bhquan.store || {
              \$DC run --rm --entrypoint '' certbot sh -c '
                mkdir -p /etc/letsencrypt/live/bhquan.store
                openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                  -keyout /etc/letsencrypt/live/bhquan.store/privkey.pem \
                  -out /etc/letsencrypt/live/bhquan.store/fullchain.pem \
                  -subj /CN=bhquan.store 2>/dev/null
              '
            }
            docker exec shared-nginx nginx -t && docker exec shared-nginx nginx -s reload
          "

      # ── INIT: Seed (chi lan dau) ─────────────────
      - name: "[INIT] Seed database"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health" > /dev/null 2>&1 && break
            [ $i -eq 30 ] && { echo "Backend not ready — skip seed"; exit 0; }
            sleep 2
          done
          echo "Seeding (first-time only)..."
          sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-admin.js 2>&1 || echo 'seed-admin: skipped (may exist)'
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-data.js 2>&1 || echo 'seed-data: skipped (may exist)'
          "

      # ── UPDATE: Upload changed files ─────────────
      - name: "[UPDATE] Upload frontend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.fe == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/frontend/src"
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Upload backend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.be == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/backend/src ${APP_DIR}/backend/dist"
          tar czf - backend/src backend/dist backend/package.json backend/package-lock.json \
            backend/Dockerfile 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Sync config"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/db"
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: "[UPDATE] Sync nginx"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/ 2>/dev/null && {
            sshpass -e ssh -p $PORT $VPS "
              if [ -f ${WEBPHOTO_DIR}/docker-compose.prod.yml ]; then
                cd ${WEBPHOTO_DIR}
                for DOMAIN in bhquan.store; do
                  CERT_EXISTS=\$(docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot \
                    test -f /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem 2>/dev/null && echo yes || echo no)
                  if [ \"\$CERT_EXISTS\" = 'no' ]; then
                    docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c \"
                      mkdir -p /etc/letsencrypt/live/\${DOMAIN}
                      openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                        -keyout /etc/letsencrypt/live/\${DOMAIN}/privkey.pem \
                        -out /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem \
                        -subj '/CN=\${DOMAIN}' 2>/dev/null
                    \"
                  fi
                done
              fi
              docker exec shared-nginx nginx -t 2>&1 | tail -1 && docker exec shared-nginx nginx -s reload
            "
          } || true

      - name: "[UPDATE] Sync infra"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.infra == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "
            echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env && chmod 600 ${INFRA_DIR}/.env
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true
            cd ${INFRA_DIR} && docker compose up -d --force-recreate 2>&1 | tail -5
            for i in \$(seq 1 60); do
              docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              [ \$i -eq 60 ] && { docker logs shared-mysql --tail 20; exit 1; }
              sleep 1
            done
          "

      - name: "[UPDATE] Rebuild backend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.be == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend 2>&1")
          if [ $? -ne 0 ]; then echo "::error::Backend build failed"; echo "$BUILD_OUT" | tail -30; exit 1; fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d backend"

      - name: "[UPDATE] Rebuild frontend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.fe == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build frontend 2>&1")
          if [ $? -ne 0 ]; then echo "::error::Frontend build failed"; echo "$BUILD_OUT" | tail -30; exit 1; fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d frontend"

      - name: "[UPDATE] Ensure nginx connected"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      # ── SHARED: Config + DB ──────────────────────
      - name: Sync .env
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT config/env $VPS:${APP_DIR}/config/env
          sshpass -e ssh -p $PORT $VPS "cp ${APP_DIR}/config/env ${APP_DIR}/.env && chmod 600 ${APP_DIR}/.env"

      - name: Ensure DB + user
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_STATUS=$(sshpass -e ssh -p $PORT $VPS "docker ps --filter name=shared-mysql --format '{{.Names}}'" 2>&1)
          [ -z "$MYSQL_STATUS" ] && { echo "::warning::shared-mysql not running — skip"; exit 0; }
          sshpass -e ssh -p $PORT $VPS "docker exec -i shared-mysql mysql -u root -p'${MYSQL_ROOT_PWD}' <<EOSQL
            CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'vietnet'@'%' IDENTIFIED BY '${VIETNET_DB_PWD}';
            GRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%';
            FLUSH PRIVILEGES;
          EOSQL"

      - name: Ensure DB schema
        if: needs.build.outputs.db == 'true'
        run: |
          set +e
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_CMD="docker exec -i shared-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet"
          TABLES_ORDER=(users login_attempts refresh_tokens password_reset_tokens categories media projects project_gallery articles products product_images consultations page_configs page_config_history settings notifications page_views page_view_daily email_logs app_logs)
          for tbl in "${TABLES_ORDER[@]}"; do
            FILE="db/schema/tables/${tbl}.sql"
            [ ! -f "$FILE" ] && continue
            sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$FILE" 2>&1 || true
          done

      - name: Run DB changelog
        run: |
          set +e
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          [ ! -d "db/changelog" ] && exit 0
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_CMD="docker exec -i shared-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet"

          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null | sort); do
            sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1 || true
          done

          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")
          PASS=0; SKIP=0; FAIL=0
          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f"); KEY="${VER}/${FNAME}"
              echo "$APPLIED" | grep -qF "$KEY" && { ((SKIP++)); continue; }
              echo -n "  $FNAME ... "
              OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
              if [ $? -eq 0 ]; then
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//;s/\.sql$//;s/_/ /g')
                CHECKSUM=$(sha256sum "$f" | cut -d' ' -f1)
                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"REPLACE INTO schema_changelog (version,filename,description,applied_by,checksum) VALUES ('$VER','$FNAME','$DESC','ci','$CHECKSUM')\"" 2>/dev/null
                echo "OK"; ((PASS++))
              else
                echo "FAILED"; echo "$OUTPUT" | tail -3 | sed 's/^/    /'; ((FAIL++))
              fi
            done
          done
          echo "Changelog: $PASS applied, $SKIP skipped, $FAIL failed"

      - name: Restart after DB changes
        if: needs.build.outputs.db == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml restart backend frontend" 2>&1 || true

  # ─── STAGE 4: VERIFY ────────────────────────────
  verify:
    name: "4. Health Check"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Load config/env
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            [[ "$line" == *=* ]] && echo "$line" >> $GITHUB_ENV
          done < config/env
          PASS=$(sed -n 's/^VPS_PASSWORD=//p' config/env)
          echo "SSHPASS=${PASS}" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.VPS_PORT }} -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure Redis noeviction
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            POLICY=\$(docker exec shared-redis redis-cli CONFIG GET maxmemory-policy 2>/dev/null | tail -1)
            if [ \"\$POLICY\" != 'noeviction' ]; then
              docker exec shared-redis redis-cli CONFIG SET maxmemory-policy noeviction
              docker exec shared-redis redis-cli CONFIG REWRITE 2>/dev/null || true
              echo 'Redis policy fixed to noeviction'
            else
              echo 'Redis: noeviction OK'
            fi
          "

      - name: Wait + Backend health
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sleep 10
          for i in $(seq 1 15); do
            RESULT=$(sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health" 2>/dev/null)
            if [ $? -eq 0 ] && [ -n "$RESULT" ]; then
              echo "Backend: OK — $RESULT"
              exit 0
            fi
            [ $i -eq 15 ] && {
              echo "::error::Backend health check failed"
              sshpass -e ssh -p $PORT $VPS "
                docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared'
                echo '---'
                docker logs vietnet-api --tail 20 2>&1
                echo '---'
                docker exec shared-redis redis-cli CONFIG GET maxmemory-policy 2>&1
              "
              exit 1
            }
            sleep 2
          done

      - name: Frontend health
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          for i in $(seq 1 10); do
            sshpass -e ssh -p $PORT $VPS "curl -sf -o /dev/null http://localhost:3100" 2>/dev/null && { echo "Frontend: OK"; exit 0; }
            [ $i -eq 10 ] && { echo "::warning::Frontend not responding"; sshpass -e ssh -p $PORT $VPS "docker logs vietnet-frontend --tail 15" 2>&1; }
            sleep 2
          done

      - name: Ensure SSL cert
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          HAS_WP=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          [ "$HAS_WP" != "yes" ] && exit 0
          CERT_INFO=$(sshpass -e ssh -p $PORT $VPS "
            cd ${WEBPHOTO_DIR}
            docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c '
              CERT=/etc/letsencrypt/live/bhquan.store/fullchain.pem
              [ ! -f \$CERT ] && echo MISSING && exit 0
              ISSUER=\$(openssl x509 -in \$CERT -noout -issuer 2>/dev/null)
              echo \$ISSUER | grep -qiE \"let.s encrypt|R3|R10|R11|E5|E6\" && echo REAL || echo PLACEHOLDER
            '
          " 2>&1)
          echo "SSL cert: $CERT_INFO"

      - name: Deploy summary
        run: |
          echo "=========================================="
          echo "  VietNet — bhquan.store"
          echo "  Mode: ${{ needs.build.outputs.mode }}"
          echo "  FE: ${{ needs.build.outputs.fe }} | BE: ${{ needs.build.outputs.be }}"
          echo "  DB: ${{ needs.build.outputs.db }} | Infra: ${{ needs.build.outputs.infra }}"
          echo "=========================================="
