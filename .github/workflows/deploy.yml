name: Auto Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/cron.yml'

# Cancel in-progress deploy khi co push moi
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  APP_DIR: /opt/vietnet
  # Nginx config nam tren WebPhoto VPS (photo-nginx serve ca 2 domain)
  WEBPHOTO_DIR: /opt/webphoto

jobs:
  # CI phai pass truoc khi deploy
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit
      - run: cd backend && npm ci && npx tsc --noEmit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Load config/env
        run: |
          grep -v '^#' config/env | grep -v '^$' | grep '=' >> $GITHUB_ENV
          PASS=$(grep '^VPS_PASSWORD=' config/env | cut -d= -f2-)
          echo "SSHPASS=${PASS}" >> $GITHUB_ENV
          echo "Config loaded from config/env"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup SSH with sshpass
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.VPS_PORT }} -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Detect first-time vs update
      - name: Detect deploy mode
        id: detect
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          if sshpass -e ssh -p $PORT $VPS "test -f ${APP_DIR}/docker-compose.prod.yml"; then
            echo "mode=update" >> $GITHUB_OUTPUT
            echo "Deploy mode: UPDATE"
          else
            echo "mode=init" >> $GITHUB_OUTPUT
            echo "Deploy mode: INIT (first-time)"
          fi

      # ══════════════════════════════════════════
      # FIRST-TIME DEPLOYMENT
      # ══════════════════════════════════════════
      - name: '[INIT] Upload full project to VPS'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Tao thu muc
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/backend ${APP_DIR}/frontend ${APP_DIR}/nginx/conf.d ${APP_DIR}/scripts ${APP_DIR}/db"

          # Docker compose + env
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e scp -P $PORT .env.example $VPS:${APP_DIR}/

          # Backend: src + dist + Dockerfile + packages
          sshpass -e scp -P $PORT -r backend/src $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT -r backend/dist $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/package.json $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/package-lock.json $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/Dockerfile $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/tsconfig.json $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/tsconfig.build.json $VPS:${APP_DIR}/backend/ 2>/dev/null || true
          sshpass -e scp -P $PORT backend/nest-cli.json $VPS:${APP_DIR}/backend/ 2>/dev/null || true

          # Frontend: src + Dockerfile + packages + config
          sshpass -e scp -P $PORT -r frontend/src $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT -r frontend/public $VPS:${APP_DIR}/frontend/ 2>/dev/null || true
          sshpass -e scp -P $PORT frontend/package.json $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/package-lock.json $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/Dockerfile $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/next.config.js $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/tailwind.config.ts $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/tsconfig.json $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/postcss.config.js $VPS:${APP_DIR}/frontend/ 2>/dev/null || true

          # Nginx config (init = HTTP only, chua co SSL)
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${WEBPHOTO_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.init.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/bhquan.store.conf

          # DB changelog
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: '[INIT] Upload config/env as .env'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT config/env $VPS:${APP_DIR}/config/env
          sshpass -e ssh -p $PORT $VPS "cp ${APP_DIR}/config/env ${APP_DIR}/.env"
          echo ".env created from config/env"

      - name: '[INIT] Start shared infrastructure (MySQL + Redis)'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra

          # Upload infra compose (chung voi WebPhoto)
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml

          # Tao .env cho infra
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env"

          # Start infra + wait for MySQL
          sshpass -e ssh -p $PORT $VPS "
            cd ${INFRA_DIR}
            docker compose up -d

            echo 'Waiting for MySQL...'
            for i in \$(seq 1 60); do
              if docker exec photo-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo 'MySQL ready!'
                break
              fi
              if [ \$i -eq 60 ]; then
                echo 'MySQL not ready after 60s'
                docker logs photo-mysql --tail 20
                exit 1
              fi
              sleep 1
            done
          "

      - name: '[INIT] Create VietNet DB user + database'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)

          sshpass -e ssh -p $PORT $VPS "docker exec -i photo-mysql mysql -u root -p${MYSQL_ROOT_PWD} <<EOSQL
            CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'vietnet'@'%' IDENTIFIED BY '${VIETNET_DB_PWD}';
            GRANT ALL PRIVILEGES ON vietnet.* TO 'vietnet'@'%';
            FLUSH PRIVILEGES;
            SELECT '[OK] vietnet database + user ready' AS result;
          EOSQL"

      - name: '[INIT] Init DB schema'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          VIETNET_DB_PWD=$(sshpass -e ssh -p $PORT $VPS "grep '^VIETNET_DB_PASSWORD=' ${APP_DIR}/.env | cut -d= -f2-")

          if [ -f "db/schema/init.sql" ]; then
            echo "Running db/schema/init.sql..."
            sshpass -e ssh -p $PORT $VPS "docker exec -i photo-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet" < db/schema/init.sql 2>&1 | tail -5
            echo "Schema init done"
          fi

      - name: '[INIT] Build & Start VietNet services'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml build backend frontend 2>&1 | tail -10
            docker compose -f docker-compose.prod.yml up -d

            # Ensure photo-nginx on vietnet network (neu da co)
            if docker ps --filter name=photo-nginx --format '{{.Names}}' | grep -q photo-nginx; then
              docker network connect vietnet_frontend photo-nginx 2>/dev/null || true
              docker exec photo-nginx nginx -s reload 2>/dev/null || true
              echo 'photo-nginx connected to vietnet_frontend'
            else
              echo 'photo-nginx not running yet — will connect when WebPhoto deploys'
            fi

            echo 'All services started'
          "

      - name: '[INIT] Setup SSL for bhquan.store'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Certbot chay qua WebPhoto docker-compose (neu co)
          HAS_WEBPHOTO=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          if [ "$HAS_WEBPHOTO" = "yes" ]; then
            sshpass -e ssh -p $PORT $VPS "
              cd ${WEBPHOTO_DIR}
              echo 'Requesting SSL certificate for bhquan.store...'
              docker compose -f docker-compose.prod.yml run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                --email admin@bhquan.store --agree-tos --no-eff-email \
                -d bhquan.store \
                2>&1 | tail -10
              echo 'SSL request done'
            "
          else
            echo "WebPhoto not deployed yet — skipping SSL (will use HTTP-only config)"
            echo "Re-run this workflow after WebPhoto is deployed to get SSL"
          fi

      - name: '[INIT] Switch to full SSL Nginx config'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Chi switch SSL config neu cert da ton tai
          HAS_CERT=$(sshpass -e ssh -p $PORT $VPS "docker exec photo-nginx test -f /etc/letsencrypt/live/bhquan.store/fullchain.pem 2>/dev/null && echo yes || echo no" 2>/dev/null || echo "no")
          if [ "$HAS_CERT" = "yes" ]; then
            sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/bhquan.store.conf
            sshpass -e ssh -p $PORT $VPS "
              docker exec photo-nginx nginx -t 2>&1 && \
              docker exec photo-nginx nginx -s reload && \
              echo 'Nginx reloaded with SSL config' || \
              echo 'WARNING: SSL config test failed — keeping init config'
            "
          else
            echo "SSL cert not found — keeping HTTP-only config for now"
          fi

      - name: '[INIT] Seed data'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-admin.js 2>&1 | tail -3 || echo 'Admin seed done (or already seeded)'
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-data.js 2>&1 | tail -3 || echo 'Data seed done (or already seeded)'
          "

      # ══════════════════════════════════════════
      # UPDATE DEPLOYMENT (existing VPS)
      # ══════════════════════════════════════════
      - name: '[UPDATE] Upload to VPS'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Clean old builds
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/backend/src ${APP_DIR}/backend/dist ${APP_DIR}/frontend/src"

          # Backend
          sshpass -e scp -P $PORT -r backend/src $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT -r backend/dist $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/package.json $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/package-lock.json $VPS:${APP_DIR}/backend/
          sshpass -e scp -P $PORT backend/Dockerfile $VPS:${APP_DIR}/backend/

          # Frontend
          sshpass -e scp -P $PORT -r frontend/src $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/package.json $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/package-lock.json $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/next.config.js $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/tailwind.config.ts $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT frontend/Dockerfile $VPS:${APP_DIR}/frontend/
          sshpass -e scp -P $PORT -r frontend/public $VPS:${APP_DIR}/frontend/ 2>/dev/null || true

          # Sync docker-compose
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/

      - name: '[UPDATE] Sync Nginx config'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/bhquan.store.conf 2>/dev/null && {
            sshpass -e ssh -p $PORT $VPS "docker exec photo-nginx nginx -t 2>&1 | tail -1 && docker exec photo-nginx nginx -s reload"
            echo "Nginx updated"
          } || echo "Nginx unchanged (skip)"

      - name: '[UPDATE] Sync shared infra'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra

          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env"
          sshpass -e ssh -p $PORT $VPS "cd ${INFRA_DIR} && docker compose up -d"

      - name: '[UPDATE] Rebuild & Restart containers'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml build backend frontend 2>&1 | tail -5
            docker compose -f docker-compose.prod.yml up -d backend frontend

            # Ensure photo-nginx on vietnet network (neu WebPhoto da deploy)
            docker network connect vietnet_frontend photo-nginx 2>/dev/null || true
            docker exec photo-nginx nginx -s reload 2>/dev/null || true
          "

      # ══════════════════════════════════════════
      # SHARED STEPS (both init and update)
      # ══════════════════════════════════════════
      - name: Sync config/env to .env on VPS
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Upload config/env moi nhat tu repo len VPS
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT config/env $VPS:${APP_DIR}/config/env
          sshpass -e ssh -p $PORT $VPS "cp ${APP_DIR}/config/env ${APP_DIR}/.env"
          echo "config/env synced to .env"

      - name: Run DB Changelog (directory-versioned)
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          if [ ! -d "db/changelog" ]; then
            echo "No changelog directory (skip)"
            exit 0
          fi

          VIETNET_DB_PWD=$(sshpass -e ssh -p $PORT $VPS "grep '^VIETNET_DB_PASSWORD=' ${APP_DIR}/.env | cut -d= -f2-")
          MYSQL_CMD="docker exec -i photo-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet"

          # Ensure tracker table exists
          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null | sort); do
            sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" > /dev/null 2>&1
          done

          # Get applied migrations
          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")
          echo "Already applied: $(echo "$APPLIED" | tr '\n' ', ' | sed 's/,$//' || echo 'none')"

          # Run unapplied
          PASS=0
          SKIP=0
          FAIL=0

          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            echo ""
            echo "── Version $VER ──"

            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f")
              KEY="${VER}/${FNAME}"

              if echo "$APPLIED" | grep -qF "$KEY"; then
                echo "  $FNAME ... SKIP (already applied)"
                ((SKIP++))
                continue
              fi

              echo -n "  $FNAME ... "
              START_MS=$(date +%s%N)
              OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
              EXIT_CODE=$?
              END_MS=$(date +%s%N)
              DURATION_MS=$(( (END_MS - START_MS) / 1000000 ))

              if [ $EXIT_CODE -eq 0 ]; then
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//; s/\.sql$//; s/_/ /g')
                CHECKSUM=$(sha256sum "$f" | cut -d' ' -f1)

                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"REPLACE INTO schema_changelog (version, filename, description, applied_by, checksum, execution_ms) VALUES ('$VER', '$FNAME', '$DESC', 'ci', '$CHECKSUM', $DURATION_MS)\"" 2>/dev/null
                echo "OK (${DURATION_MS}ms)"
                ((PASS++))
              else
                echo "FAILED"
                echo "$OUTPUT" | tail -5 | sed 's/^/    /'
                ((FAIL++))
              fi
            done
          done

          echo ""
          echo "Changelog: $PASS applied, $SKIP skipped, $FAIL failed"
          if [ $FAIL -gt 0 ]; then exit 1; fi

      - name: Health Check
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sleep 8
          sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health && echo ''" && echo "Backend: OK" || { echo "Backend health check FAILED"; exit 1; }
          sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:3100 > /dev/null" && echo "Frontend: OK" || echo "Frontend: WARNING (may still be starting)"
          echo "Deploy successful! (mode: ${{ steps.detect.outputs.mode }})"
