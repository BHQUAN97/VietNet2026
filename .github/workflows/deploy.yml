name: Auto Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/cron.yml'
      - '.github/workflows/restore.yml'
      - '.github/workflows/vps-setup.yml'

# Cancel in-progress deploy khi co push moi
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  APP_DIR: /opt/vietnet
  # Nginx config nam tren WebPhoto VPS (shared-nginx serve ca 2 domain)
  WEBPHOTO_DIR: /opt/webphoto

jobs:
  # CI phai pass truoc khi deploy — chay song song FE + BE
  typecheck-fe:
    name: Typecheck Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: Typecheck Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    steps:
      - uses: actions/checkout@v4

      - name: Load config/env
        run: |
          grep -v '^#' config/env | grep -v '^$' | grep '=' >> $GITHUB_ENV
          PASS=$(grep '^VPS_PASSWORD=' config/env | cut -d= -f2-)
          echo "SSHPASS=${PASS}" >> $GITHUB_ENV
          echo "Config loaded"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup SSH with sshpass
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass mysql-client > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.VPS_PORT }} -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Detect first-time vs update
      - name: Detect deploy mode
        id: detect
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          if sshpass -e ssh -p $PORT $VPS "test -f ${APP_DIR}/docker-compose.prod.yml"; then
            echo "mode=update" >> $GITHUB_OUTPUT
            echo "Deploy mode: UPDATE"
          else
            echo "mode=init" >> $GITHUB_OUTPUT
            echo "Deploy mode: INIT (first-time)"
          fi

      - name: Detect changes
        id: changes
        run: |
          # So sanh voi commit truoc
          DIFF=$(git diff --name-only HEAD~1 2>/dev/null || echo "FULL")
          echo "Changed files:"
          echo "$DIFF" | head -20

          # Detect categories
          fe_changed=false; be_changed=false; infra_changed=false; db_changed=false; config_changed=false

          if [ "$DIFF" = "FULL" ]; then
            fe_changed=true; be_changed=true; infra_changed=true; db_changed=true; config_changed=true
          else
            echo "$DIFF" | grep -qE '^frontend/' && fe_changed=true
            echo "$DIFF" | grep -qE '^backend/' && be_changed=true
            echo "$DIFF" | grep -qE '^(docker-compose|infra/|nginx/|.*/Dockerfile)' && infra_changed=true
            echo "$DIFF" | grep -qE '^(db/|backend/src/.*entity)' && db_changed=true
            echo "$DIFF" | grep -qE '^config/' && config_changed=true
          fi

          # INIT mode = build everything
          if [ "${{ steps.detect.outputs.mode }}" = "init" ]; then
            fe_changed=true; be_changed=true; infra_changed=true; db_changed=true; config_changed=true
          fi

          echo "fe=$fe_changed" >> $GITHUB_OUTPUT
          echo "be=$be_changed" >> $GITHUB_OUTPUT
          echo "infra=$infra_changed" >> $GITHUB_OUTPUT
          echo "db=$db_changed" >> $GITHUB_OUTPUT
          echo "config=$config_changed" >> $GITHUB_OUTPUT
          echo "Changes: fe=$fe_changed be=$be_changed infra=$infra_changed db=$db_changed config=$config_changed"

      - name: Build Backend
        if: steps.changes.outputs.be == 'true'
        run: |
          cd backend
          npm ci
          npm run build

      - name: Build Frontend
        if: steps.changes.outputs.fe == 'true'
        run: |
          cd frontend
          npm ci
          npm run build

      # ══════════════════════════════════════════
      # FIRST-TIME DEPLOYMENT
      # ══════════════════════════════════════════
      - name: '[INIT] Upload full project to VPS'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Tao thu muc
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/backend ${APP_DIR}/frontend ${APP_DIR}/nginx/conf.d ${APP_DIR}/scripts ${APP_DIR}/db"

          # Docker compose + env
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e scp -P $PORT .env.example $VPS:${APP_DIR}/

          # Backend: tar pipe thay scp -r (nhanh hon nhieu voi nhieu file nho)
          tar czf - backend/src backend/dist backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json \
            backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          # Frontend: tar pipe (113+ files trong src/, scp -r rat cham)
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          # Nginx config (full SSL — placeholder cert se duoc tao truoc khi start)
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${WEBPHOTO_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/bhquan.store.conf

          # DB schema + changelog
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

          echo "[OK] Full project uploaded"

      - name: '[INIT] Upload config/env as .env'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT config/env $VPS:${APP_DIR}/config/env
          sshpass -e ssh -p $PORT $VPS "cp ${APP_DIR}/config/env ${APP_DIR}/.env && chmod 600 ${APP_DIR}/.env"
          echo "[OK] .env created from config/env"

      - name: '[INIT] Start shared infrastructure (MySQL + Redis)'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra

          # Upload infra compose (chung voi WebPhoto)
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml

          # Tao .env cho infra
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env && chmod 600 ${INFRA_DIR}/.env"

          # Ensure shared networks exist, then start infra
          sshpass -e ssh -p $PORT $VPS "
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true

            # Xoa container cu (ten cu photo-* hoac orphan)
            docker rm -f photo-mysql photo-redis 2>/dev/null || true

            cd ${INFRA_DIR}
            docker compose up -d

            echo 'Waiting for MySQL...'
            for i in \$(seq 1 60); do
              if docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo 'MySQL ready!'
                break
              fi
              if [ \$i -eq 60 ]; then
                echo 'ERROR: MySQL not ready after 60s'
                docker logs shared-mysql --tail 20
                exit 1
              fi
              sleep 1
            done
          "
          echo "[OK] Infra started"

      - name: '[INIT] Create VietNet DB user + database'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)

          echo "--- Creating DB + user ---"
          OUTPUT=$(sshpass -e ssh -p $PORT $VPS "docker exec -i shared-mysql mysql -u root -p'${MYSQL_ROOT_PWD}' <<EOSQL
            CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'vietnet'@'%' IDENTIFIED BY '${VIETNET_DB_PWD}';
            GRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%';
            FLUSH PRIVILEGES;
            SELECT '[OK]' AS result;
          EOSQL" 2>&1)
          echo "$OUTPUT"
          echo "[OK] DB vietnet + user created"

      - name: '[INIT] Generate placeholder SSL certs'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Tao self-signed placeholder certs de nginx start duoc voi full SSL config
          # Certbot container thuoc WebPhoto — dung no de ghi vao certbot_data volume
          HAS_WEBPHOTO=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          if [ "$HAS_WEBPHOTO" = "yes" ]; then
            sshpass -e ssh -p $PORT $VPS "
              cd ${WEBPHOTO_DIR}
              for DOMAIN in bhquan.store bhquan.site; do
                CERT_EXISTS=\$(docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot \
                  test -f /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem 2>/dev/null && echo yes || echo no)
                if [ \"\$CERT_EXISTS\" = 'no' ]; then
                  echo \"Generating placeholder cert for \${DOMAIN}...\"
                  docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c \"
                    mkdir -p /etc/letsencrypt/live/\${DOMAIN}
                    openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                      -keyout /etc/letsencrypt/live/\${DOMAIN}/privkey.pem \
                      -out /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem \
                      -subj '/CN=\${DOMAIN}' 2>/dev/null
                  \"
                  echo '  OK'
                else
                  echo \"\${DOMAIN}: cert exists\"
                fi
              done
            "
            echo "[OK] SSL placeholders ready"
          else
            echo "WebPhoto not deployed — nginx/certbot not available, skipping placeholder certs"
          fi

      - name: '[INIT] Build & Start VietNet services'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          echo "--- Building backend + frontend images ---"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml build backend frontend 2>&1
          ")
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "ERROR: Docker build failed (exit=$BUILD_EXIT)"
            echo "$BUILD_OUT" | tail -30
            exit 1
          fi
          echo "[OK] Images built"

          echo "--- Starting all services ---"
          START_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml up -d 2>&1
          ")
          if [ $? -ne 0 ]; then
            echo "ERROR: docker compose up failed"
            echo "$START_OUT"
            echo ""
            echo "=== Container status ==="
            sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared'" 2>&1
            echo ""
            echo "=== Backend logs ==="
            sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 30 2>&1"
            exit 1
          fi

          # Ensure shared-nginx on vietnet network (neu da co)
          sshpass -e ssh -p $PORT $VPS "
            if docker ps --filter name=shared-nginx --format '{{.Names}}' | grep -q shared-nginx; then
              docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
              docker exec shared-nginx nginx -s reload 2>/dev/null || true
              echo 'shared-nginx connected to vietnet_frontend'
            else
              echo 'shared-nginx not running yet — will connect when WebPhoto deploys'
            fi
          "

          echo "--- Container status ---"
          sshpass -e ssh -p $PORT $VPS "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | head -15"
          echo "[OK] All services started"

      - name: '[INIT] Get real SSL certs + reload nginx'
        if: steps.detect.outputs.mode == 'init'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          HAS_WEBPHOTO=$(sshpass -e ssh -p $PORT $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no")
          if [ "$HAS_WEBPHOTO" != "yes" ]; then
            echo "WebPhoto not deployed — skipping SSL (using placeholder)"
            exit 0
          fi

          # bhquan.store (timeout 120s)
          echo "--- Certbot: bhquan.store ---"
          sshpass -e ssh -p $PORT $VPS "
            cd ${WEBPHOTO_DIR}
            timeout 120 docker compose -f docker-compose.prod.yml run --rm --entrypoint "" certbot certbot certonly \
              --webroot -w /var/www/certbot \
              --email admin@bhquan.site --agree-tos --no-eff-email \
              --force-renewal \
              -d bhquan.store -d www.bhquan.store \
              2>&1 | tail -10
          " && echo "[OK] bhquan.store cert" || echo "WARNING: bhquan.store cert failed — using placeholder"

          # bhquan.site (nếu chưa có)
          echo "--- Certbot: bhquan.site ---"
          sshpass -e ssh -p $PORT $VPS "
            cd ${WEBPHOTO_DIR}
            timeout 120 docker compose -f docker-compose.prod.yml run --rm --entrypoint "" certbot certbot certonly \
              --webroot -w /var/www/certbot \
              --email admin@bhquan.site --agree-tos --no-eff-email \
              --force-renewal \
              -d bhquan.site -d api.bhquan.site -d ws.bhquan.site \
              2>&1 | tail -10
          " && echo "[OK] bhquan.site cert" || echo "WARNING: bhquan.site cert failed — using placeholder"

          # Reload nginx
          sshpass -e ssh -p $PORT $VPS "
            docker exec shared-nginx nginx -t 2>&1 && \
            docker exec shared-nginx nginx -s reload && \
            echo '[OK] Nginx reloaded with SSL' || \
            echo 'WARNING: Nginx reload failed'
          "

      # ══════════════════════════════════════════
      # UPDATE DEPLOYMENT (existing VPS)
      # ══════════════════════════════════════════
      - name: '[UPDATE] Upload frontend'
        if: steps.detect.outputs.mode == 'update' && steps.changes.outputs.fe == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Clean old frontend src
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/frontend/src"

          # Frontend: tar pipe (1 stream thay 113+ scp calls)
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "[OK] Frontend uploaded"

      - name: '[UPDATE] Upload backend'
        if: steps.detect.outputs.mode == 'update' && steps.changes.outputs.be == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Clean old backend builds
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/backend/src ${APP_DIR}/backend/dist"

          # Backend: tar pipe (1 stream thay nhieu scp calls)
          tar czf - backend/src backend/dist backend/package.json backend/package-lock.json \
            backend/Dockerfile 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "[OK] Backend uploaded"

      - name: '[UPDATE] Sync deploy config'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          # Sync docker-compose
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/

          # Sync DB schema + changelog
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/db"
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

          echo "[OK] Deploy config synced"

      - name: '[UPDATE] Sync Nginx config'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${WEBPHOTO_DIR}/nginx/conf.d/bhquan.store.conf 2>/dev/null && {
            # Ensure placeholder cert exists before reloading
            sshpass -e ssh -p $PORT $VPS "
              if [ -f ${WEBPHOTO_DIR}/docker-compose.prod.yml ]; then
                cd ${WEBPHOTO_DIR}
                for DOMAIN in bhquan.store bhquan.site; do
                  CERT_EXISTS=\$(docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot \
                    test -f /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem 2>/dev/null && echo yes || echo no)
                  if [ \"\$CERT_EXISTS\" = 'no' ]; then
                    echo \"Placeholder cert for \${DOMAIN}...\"
                    docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c \"
                      mkdir -p /etc/letsencrypt/live/\${DOMAIN}
                      openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                        -keyout /etc/letsencrypt/live/\${DOMAIN}/privkey.pem \
                        -out /etc/letsencrypt/live/\${DOMAIN}/fullchain.pem \
                        -subj '/CN=\${DOMAIN}' 2>/dev/null
                    \"
                  fi
                done
              fi
              docker exec shared-nginx nginx -t 2>&1 | tail -1 && docker exec shared-nginx nginx -s reload
            "
            echo "[OK] Nginx updated"
          } || echo "Nginx unchanged (skip)"

      - name: '[UPDATE] Sync shared infra'
        if: steps.detect.outputs.mode == 'update' && steps.changes.outputs.infra == 'true'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          INFRA_DIR=/opt/infra

          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml
          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          sshpass -e ssh -p $PORT $VPS "echo 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}' > ${INFRA_DIR}/.env && chmod 600 ${INFRA_DIR}/.env"
          sshpass -e ssh -p $PORT $VPS "
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true
            docker rm -f photo-mysql photo-redis 2>/dev/null || true
            cd ${INFRA_DIR} && docker compose up -d --force-recreate

            echo 'Waiting for MySQL...'
            for i in \$(seq 1 60); do
              if docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo 'MySQL ready!'
                break
              fi
              [ \$i -eq 60 ] && echo 'WARNING: MySQL slow to start' && exit 1
              sleep 1
            done
          "
          echo "[OK] Infra synced"

      - name: '[UPDATE] Rebuild backend'
        if: steps.detect.outputs.mode == 'update' && (steps.changes.outputs.be == 'true' || steps.changes.outputs.infra == 'true')
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          echo "--- Rebuilding backend ---"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml build backend 2>&1
          ")
          if [ $? -ne 0 ]; then
            echo "ERROR: Backend build failed"
            echo "$BUILD_OUT" | tail -30
            exit 1
          fi

          UP_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml up -d backend 2>&1
          ")
          if [ $? -ne 0 ]; then
            echo "ERROR: Backend start failed"
            echo "$UP_OUT"
            echo ""
            echo "=== Container status ==="
            sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared'" 2>&1
            echo ""
            echo "=== Backend logs ==="
            sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 30 2>&1"
            exit 1
          fi
          echo "[OK] Backend rebuilt"

      - name: '[UPDATE] Rebuild frontend'
        if: steps.detect.outputs.mode == 'update' && (steps.changes.outputs.fe == 'true' || steps.changes.outputs.infra == 'true')
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          echo "--- Rebuilding frontend ---"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml build frontend 2>&1
          ")
          if [ $? -ne 0 ]; then
            echo "ERROR: Frontend build failed"
            echo "$BUILD_OUT" | tail -30
            exit 1
          fi

          UP_OUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml up -d frontend 2>&1
          ")
          if [ $? -ne 0 ]; then
            echo "ERROR: Frontend start failed"
            echo "$UP_OUT"
            echo ""
            echo "=== Container status ==="
            sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared'" 2>&1
            echo ""
            echo "=== Frontend logs ==="
            sshpass -e ssh -p $PORT $VPS "docker logs vietnet-frontend --tail 30 2>&1"
            exit 1
          fi
          echo "[OK] Frontend rebuilt"

      - name: '[UPDATE] Ensure nginx connected'
        if: steps.detect.outputs.mode == 'update'
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "
          sshpass -e ssh -p $PORT $VPS "docker ps --format 'table {{.Names}}\t{{.Status}}' | head -10"

      # ══════════════════════════════════════════
      # SHARED STEPS (both init and update)
      # ══════════════════════════════════════════
      - name: Sync config/env to .env on VPS
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT config/env $VPS:${APP_DIR}/config/env
          sshpass -e ssh -p $PORT $VPS "cp ${APP_DIR}/config/env ${APP_DIR}/.env && chmod 600 ${APP_DIR}/.env"
          echo "[OK] config/env synced to .env"

      - name: Ensure DB + user exist
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          MYSQL_ROOT_PWD=$(grep '^MYSQL_ROOT_PASSWORD=' config/env | cut -d= -f2-)
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)

          echo "--- Checking shared-mysql container ---"
          MYSQL_STATUS=$(sshpass -e ssh -p $PORT $VPS "docker ps --filter name=shared-mysql --format '{{.Names}} {{.Status}}'" 2>&1)
          if [ -z "$MYSQL_STATUS" ]; then
            echo "ERROR: shared-mysql container not running!"
            echo ""
            echo "=== All containers ==="
            sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'mysql|redis'" 2>&1
            exit 1
          fi
          echo "  $MYSQL_STATUS"

          echo "--- Creating DB + user ---"
          OUTPUT=$(sshpass -e ssh -p $PORT $VPS "docker exec -i shared-mysql mysql -u root -p'${MYSQL_ROOT_PWD}' <<EOSQL
            CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'vietnet'@'%' IDENTIFIED BY '${VIETNET_DB_PWD}';
            GRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%';
            FLUSH PRIVILEGES;
            SELECT '[OK]' AS result;
          EOSQL" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Failed to create DB/user (exit=$EXIT_CODE)"
            exit 1
          fi

          echo "--- Verifying connection as vietnet ---"
          VERIFY=$(sshpass -e ssh -p $PORT $VPS "docker exec -i shared-mysql mysql -u vietnet -p'${VIETNET_DB_PWD}' vietnet -e 'SELECT DATABASE() AS db'" 2>&1)
          VERIFY_EXIT=$?
          if [ $VERIFY_EXIT -ne 0 ]; then
            echo "ERROR: vietnet user cannot access vietnet DB (exit=$VERIFY_EXIT)"
            echo "$VERIFY"
            exit 1
          fi
          echo "[OK] DB vietnet + user verified"

      - name: Ensure DB schema (init.sql)
        if: steps.changes.outputs.db == 'true'
        run: |
          set +e
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_CMD="docker exec -i shared-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet"

          # init.sql dung SOURCE — khong chay duoc qua docker exec
          # Thay vao do, chay tung file table truc tiep theo thu tu FK
          echo "--- Running schema tables (IF NOT EXISTS) ---"
          TABLES_ORDER=(
            users login_attempts refresh_tokens password_reset_tokens
            categories media projects project_gallery
            articles products product_images consultations
            page_configs page_config_history settings notifications
            page_views page_view_daily email_logs app_logs
          )
          PASS=0
          FAIL=0

          for tbl in "${TABLES_ORDER[@]}"; do
            FILE="db/schema/tables/${tbl}.sql"
            if [ ! -f "$FILE" ]; then
              echo "  $tbl.sql ... NOT FOUND (skip)"
              continue
            fi

            OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$FILE" 2>&1)
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "  $tbl ... OK"
              ((PASS++))
            else
              echo "  $tbl ... FAILED (exit=$EXIT_CODE)"
              echo "$OUTPUT" | tail -3 | sed 's/^/    /'
              ((FAIL++))
            fi
          done

          echo ""
          echo "--- Verifying tables ---"
          TABLE_COUNT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e 'SELECT COUNT(*) FROM information_schema.tables WHERE table_schema=\"vietnet\"'" 2>&1)
          echo "  Tables in vietnet: $TABLE_COUNT"

          if [ "$FAIL" -gt 0 ]; then
            echo "ERROR: $FAIL tables failed to create"
            echo ""
            echo "=== MySQL error log ==="
            sshpass -e ssh -p $PORT $VPS "docker logs shared-mysql --tail 10 2>&1"
            exit 1
          fi
          echo "[OK] Schema ready ($PASS tables, $TABLE_COUNT total)"

      - name: Wait for backend container ready
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          echo "Waiting for backend container..."
          for i in $(seq 1 30); do
            STATUS=$(sshpass -e ssh -p $PORT $VPS "docker inspect -f '{{.State.Status}}' vietnet-api 2>/dev/null" 2>&1)
            if [ "$STATUS" = "running" ]; then
              echo "  Backend container running (${i}s)"
              sleep 2
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Backend container not running after 30s (status=$STATUS)"
              echo ""
              echo "=== Container status ==="
              sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'vietnet|shared'" 2>&1
              echo ""
              echo "=== Backend logs ==="
              sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 30 2>&1"
              echo ""
              echo "=== Redis policy ==="
              sshpass -e ssh -p $PORT $VPS "docker exec shared-redis redis-cli CONFIG GET maxmemory-policy" 2>&1
              exit 1
            fi
            sleep 1
          done

      - name: Seed database
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          echo "--- Running seed-admin ---"
          OUTPUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-admin.js 2>&1
          " 2>&1)
          echo "$OUTPUT"
          echo ""

          echo "--- Running seed-data ---"
          OUTPUT=$(sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-data.js 2>&1
          " 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "WARNING: Seed exit=$EXIT_CODE"
            echo "=== Backend container status ==="
            sshpass -e ssh -p $PORT $VPS "docker inspect -f '{{.State.Status}} ({{.State.ExitCode}})' vietnet-api" 2>&1
            echo "=== Backend logs (last 10) ==="
            sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 10 2>&1"
            echo "(Seed failure is non-blocking — data may already exist)"
          else
            echo "[OK] Seed complete"
          fi

      - name: Run DB Changelog
        if: steps.changes.outputs.db == 'true'
        run: |
          set +e
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"

          if [ ! -d "db/changelog" ]; then
            echo "No changelog directory (skip)"
            exit 0
          fi

          VIETNET_DB_PWD=$(grep '^VIETNET_DB_PASSWORD=' config/env | cut -d= -f2-)
          MYSQL_CMD="docker exec -i shared-mysql mysql -u vietnet -p${VIETNET_DB_PWD} vietnet"

          # Step 1: _init scripts
          echo "[1/3] Running _init scripts..."
          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null | sort); do
            echo "  $(basename $f)..."
            INIT_OUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
            INIT_EXIT=$?
            if [ $INIT_EXIT -ne 0 ]; then
              echo "    WARN: exit=$INIT_EXIT"
              echo "$INIT_OUT" | tail -3 | sed 's/^/    /'
            else
              echo "    OK"
            fi
          done

          # Step 2: Get applied
          echo "[2/3] Checking applied migrations..."
          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")
          echo "  Already applied: $(echo "$APPLIED" | tr '\n' ', ' | sed 's/,$//' || echo 'none')"

          # Step 3: Run migrations
          echo "[3/3] Running migrations..."
          PASS=0; SKIP=0; FAIL=0

          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            echo ""
            echo "── $VER ──"

            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f")
              KEY="${VER}/${FNAME}"

              if echo "$APPLIED" | grep -qF "$KEY"; then
                echo "  $FNAME ... SKIP"
                ((SKIP++))
                continue
              fi

              echo -n "  $FNAME ... "
              START_MS=$(date +%s%N)
              OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
              EXIT_CODE=$?
              END_MS=$(date +%s%N)
              DURATION_MS=$(( (END_MS - START_MS) / 1000000 ))

              if [ $EXIT_CODE -eq 0 ]; then
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//; s/\.sql$//; s/_/ /g')
                CHECKSUM=$(sha256sum "$f" | cut -d' ' -f1)
                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"REPLACE INTO schema_changelog (version, filename, description, applied_by, checksum, execution_ms) VALUES ('$VER', '$FNAME', '$DESC', 'ci', '$CHECKSUM', $DURATION_MS)\"" 2>/dev/null
                echo "OK (${DURATION_MS}ms)"
                ((PASS++))
              else
                echo "FAILED (exit=$EXIT_CODE)"
                echo "$OUTPUT" | sed 's/^/    /'
                ((FAIL++))
              fi
            done
          done

          echo ""
          echo "Changelog: $PASS applied, $SKIP skipped, $FAIL failed"
          if [ $FAIL -gt 0 ]; then exit 1; fi

      - name: Health Check
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          SSH_OPTS="-o ConnectTimeout=10 -o ServerAliveInterval=5 -o ServerAliveCountMax=3"

          # Ensure Redis noeviction policy
          sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
            POLICY=\$(docker exec shared-redis redis-cli CONFIG GET maxmemory-policy 2>/dev/null | tail -1)
            if [ \"\$POLICY\" != 'noeviction' ]; then
              echo 'Fixing Redis eviction policy...'
              docker exec shared-redis redis-cli CONFIG SET maxmemory-policy noeviction
              docker exec shared-redis redis-cli CONFIG REWRITE 2>/dev/null || true
              echo 'Redis policy set to noeviction'
            fi
          " 2>&1 || true

          # Ensure shared-nginx connected + running
          sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          " 2>&1 || true

          set +e

          echo "--- Backend ---"
          for i in $(seq 1 15); do
            RESULT=$(sshpass -e ssh -p $PORT $SSH_OPTS $VPS "curl -sf http://localhost:4100/api/health" 2>&1)
            SSH_EXIT=$?
            if [ $SSH_EXIT -eq 0 ] && [ -n "$RESULT" ]; then
              echo "  Backend healthy (attempt $i): $RESULT"
              break
            fi
            echo "  attempt $i: ssh_exit=$SSH_EXIT result='$RESULT'"
            if [ $i -eq 15 ]; then
              echo "ERROR: Backend health check failed after 30s"
              echo ""
              echo "=== DIAGNOSTICS ==="
              sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
                echo '--- Container status ---'
                docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'vietnet|shared' || echo '(none)'

                echo ''
                echo '--- Backend logs (last 30) ---'
                docker logs vietnet-api --tail 30 --no-log-prefix 2>&1 || echo '(failed)'

                echo ''
                echo '--- Frontend logs (last 15) ---'
                docker logs vietnet-frontend --tail 15 --no-log-prefix 2>&1 || echo '(failed)'

                echo ''
                echo '--- Redis check ---'
                docker exec shared-redis redis-cli CONFIG GET maxmemory-policy 2>&1 || echo '(failed)'

                echo ''
                echo '--- Docker networks ---'
                docker network ls | grep -E 'webphoto|vietnet' || echo '(none)'

                echo ''
                echo '--- Disk/Memory ---'
                df -h / | tail -1
                free -h | head -2
              " 2>&1 || echo "WARNING: Diagnostic SSH call failed"
              exit 1
            fi
            sleep 2
          done

          echo "--- Frontend ---"
          for i in $(seq 1 10); do
            sshpass -e ssh -p $PORT $SSH_OPTS $VPS "curl -sf http://localhost:3100 > /dev/null" 2>&1
            if [ $? -eq 0 ]; then
              echo "  Frontend healthy (attempt $i)"
              break
            fi
            echo "  attempt $i: not ready"
            if [ $i -eq 10 ]; then
              echo "  WARNING: Frontend not responding after 20s"
              sshpass -e ssh -p $PORT $SSH_OPTS $VPS "docker logs vietnet-frontend --tail 15 --no-log-prefix 2>&1" || true
            fi
            sleep 2
          done

          echo ""
          echo "Deploy successful! (mode=${{ steps.detect.outputs.mode }}, fe=${{ steps.changes.outputs.fe }}, be=${{ steps.changes.outputs.be }}, infra=${{ steps.changes.outputs.infra }})"

      - name: Ensure SSL Certificates
        run: |
          VPS="${{ env.VPS_USER }}@${{ env.VPS_HOST }}"
          PORT="${{ env.VPS_PORT }}"
          SSH_OPTS="-o ConnectTimeout=10 -o ServerAliveInterval=5 -o ServerAliveCountMax=3"

          # Check if WebPhoto certbot is available
          HAS_WEBPHOTO=$(sshpass -e ssh -p $PORT $SSH_OPTS $VPS "test -f ${WEBPHOTO_DIR}/docker-compose.prod.yml && echo yes || echo no" 2>&1)
          if [ "$HAS_WEBPHOTO" != "yes" ]; then
            echo "WebPhoto not deployed — cannot run Certbot, using placeholder certs"
            exit 0
          fi

          # Check if real cert exists (not self-signed placeholder)
          CERT_INFO=$(sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
            cd ${WEBPHOTO_DIR}
            docker compose -f docker-compose.prod.yml run --rm --entrypoint '' certbot sh -c '
              CERT=/etc/letsencrypt/live/bhquan.store/fullchain.pem
              if [ ! -f \$CERT ]; then echo MISSING; exit 0; fi
              ISSUER=\$(openssl x509 -in \$CERT -noout -issuer 2>/dev/null)
              if echo \$ISSUER | grep -qi \"let.s encrypt\\|R3\\|R10\\|R11\\|E5\\|E6\"; then
                echo REAL
              else
                echo PLACEHOLDER
              fi
            '
          " 2>&1)

          echo "Cert status: $CERT_INFO"

          if echo "$CERT_INFO" | grep -q "REAL"; then
            echo "Real SSL cert exists — skip Certbot"
          else
            echo "Requesting real SSL certs via Certbot (timeout 120s)..."

            # bhquan.store
            sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
              cd ${WEBPHOTO_DIR}
              timeout 120 docker compose -f docker-compose.prod.yml run --rm --entrypoint "" certbot certbot certonly \
                --webroot -w /var/www/certbot \
                --email admin@bhquan.site --agree-tos --no-eff-email \
                --force-renewal \
                -d bhquan.store -d www.bhquan.store \
                2>&1 | tail -10
            " 2>&1 && echo "[OK] bhquan.store cert" || echo "WARNING: bhquan.store cert failed — using placeholder"

            # bhquan.site (nếu cũng cần)
            sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
              cd ${WEBPHOTO_DIR}
              timeout 120 docker compose -f docker-compose.prod.yml run --rm --entrypoint "" certbot certbot certonly \
                --webroot -w /var/www/certbot \
                --email admin@bhquan.site --agree-tos --no-eff-email \
                --force-renewal \
                -d bhquan.site -d api.bhquan.site -d ws.bhquan.site \
                2>&1 | tail -10
            " 2>&1 && echo "[OK] bhquan.site cert" || echo "WARNING: bhquan.site cert failed — using placeholder"
          fi

          # Reload nginx
          sshpass -e ssh -p $PORT $SSH_OPTS $VPS "
            docker exec shared-nginx nginx -t 2>&1
            if [ \$? -eq 0 ]; then
              docker exec shared-nginx nginx -s reload
              echo '[OK] Nginx reloaded'
            else
              echo 'ERROR: Nginx config test failed'
              docker exec shared-nginx nginx -T 2>&1 | tail -20
            fi
          " 2>&1
