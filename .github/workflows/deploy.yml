name: Auto Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/cron.yml'
      - '.github/workflows/restore.yml'
      - '.github/workflows/vps-setup.yml'

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  APP_DIR: /opt/vietnet
  INFRA_DIR: /opt/infra

# ══════════════════════════════════════════════════════
# Pipeline: typecheck → build → deploy → verify
# ══════════════════════════════════════════════════════

jobs:
  # ─── STAGE 1: TYPE CHECK (parallel) ──────────────
  typecheck-fe:
    name: "1. Typecheck FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: "1. Typecheck BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  # ─── STAGE 2: DETECT CHANGES ─────────────────────
  build:
    name: "2. Detect Changes"
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      fe: ${{ steps.changes.outputs.fe }}
      be: ${{ steps.changes.outputs.be }}
      infra: ${{ steps.changes.outputs.infra }}
      db: ${{ steps.changes.outputs.db }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Detect deploy mode
        id: detect
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health > /dev/null 2>&1"; then
            echo "mode=update" >> $GITHUB_OUTPUT
            echo "Deploy mode: UPDATE (API healthy)"
          else
            echo "mode=init" >> $GITHUB_OUTPUT
            echo "Deploy mode: INIT (API not responding)"
          fi

      - name: Detect changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            DIFF="FULL"
          else
            DIFF=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo "FULL")
          fi
          echo "Changed files:"
          echo "$DIFF" | head -20

          fe=false; be=false; infra=false; db=false; config=false
          if [ "$DIFF" = "FULL" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          else
            echo "$DIFF" | grep -qE '^frontend/' && fe=true
            echo "$DIFF" | grep -qE '^backend/' && be=true
            echo "$DIFF" | grep -qE '^(docker-compose|infra/|nginx/|.*/Dockerfile)' && infra=true
            echo "$DIFF" | grep -qE '^(db/|backend/src/.*entity)' && db=true
            echo "$DIFF" | grep -qE '^config/' && config=true
          fi
          if [ "${{ steps.detect.outputs.mode }}" = "init" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          fi

          echo "fe=$fe" >> $GITHUB_OUTPUT
          echo "be=$be" >> $GITHUB_OUTPUT
          echo "infra=$infra" >> $GITHUB_OUTPUT
          echo "db=$db" >> $GITHUB_OUTPUT
          echo "config=$config" >> $GITHUB_OUTPUT
          echo "Changes: fe=$fe be=$be infra=$infra db=$db config=$config"

  # ─── STAGE 3: DEPLOY TO VPS ─────────────────────
  deploy:
    name: "3. Deploy"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Check docker on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            DOCKER=\$(command -v docker 2>/dev/null \
              || ls /usr/bin/docker /usr/local/bin/docker /snap/bin/docker 2>/dev/null | head -1)
            if [ -z \"\$DOCKER\" ]; then
              echo '::error::Docker chua cai tren VPS. Chay vps-setup.yml voi action=docker truoc.'
              exit 1
            fi
            [ ! -f /usr/local/bin/docker ] && ln -sf \"\$DOCKER\" /usr/local/bin/docker 2>/dev/null || true
            echo \"Docker OK: \$(\$DOCKER --version)\"
          "

      # ── INIT: Full upload ────────────────────────
      - name: "[INIT] Upload full project"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker stop vietnet-api vietnet-frontend 2>/dev/null || true
            docker rm vietnet-api vietnet-frontend 2>/dev/null || true
          "
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/{backend,frontend,nginx/conf.d,scripts,db,config} ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e scp -P $PORT .env.example $VPS:${APP_DIR}/

          echo "  Uploading backend..."
          tar czf - backend/src backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading frontend..."
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading nginx + db + scripts..."
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${INFRA_DIR}/nginx/conf.d/bhquan.store.conf
          sshpass -e scp -P $PORT infra/nginx/nginx.conf $VPS:${INFRA_DIR}/nginx/nginx.conf
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: "[INIT] Start shared infra"
        if: needs.build.outputs.mode == 'init'
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml
          printf '%s' "$MYSQL_ROOT_PASSWORD" > /tmp/mysql_root_pass.txt
          sshpass -e scp -P $PORT /tmp/mysql_root_pass.txt $VPS:/tmp/mysql_root_pass.txt
          rm -f /tmp/mysql_root_pass.txt
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true
            mkdir -p /opt/webphoto/photo-storage/dist

            MYSQL_OK=\$(docker ps --filter name=shared-mysql --filter status=running --format '{{.Names}}' | grep -c shared-mysql || echo 0)
            NGINX_OK=\$(docker ps --filter name=shared-nginx --filter status=running --format '{{.Names}}' | grep -c shared-nginx || echo 0)

            if [ \"\$MYSQL_OK\" -gt 0 ] && [ \"\$NGINX_OK\" -gt 0 ]; then
              echo 'Infra already running — skip'
              rm -f /tmp/mysql_root_pass.txt
            else
              echo 'Starting shared infra...'
              docker pull nginx:1.27-alpine 2>&1 | tail -1
              echo '--- Pre-start: placeholder cert for bhquan.store (nginx needs cert to start) ---'
              docker run --rm \
                -v shared_certbot_data:/etc/letsencrypt \
                certbot/certbot sh -c '
                  CERT=/etc/letsencrypt/live/bhquan.store/fullchain.pem
                  if openssl x509 -in \$CERT -noout -checkend 3600 2>/dev/null; then
                    echo Cert already valid for bhquan.store
                  else
                    mkdir -p /etc/letsencrypt/live/bhquan.store
                    openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                      -keyout /etc/letsencrypt/live/bhquan.store/privkey.pem \
                      -out \$CERT -subj /CN=bhquan.store 2>/dev/null && echo Placeholder OK
                  fi
                ' 2>&1 || echo '::warning::Placeholder cert failed — nginx may not start'
              MYSQL_ROOT_PASSWORD=\$(cat /tmp/mysql_root_pass.txt) docker compose -f ${INFRA_DIR}/docker-compose.yml up -d 2>&1
              rm -f /tmp/mysql_root_pass.txt
              for i in \$(seq 1 60); do
                docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && { echo 'MySQL ready!'; break; }
                [ \$i -eq 60 ] && { echo 'ERROR: MySQL not ready'; docker logs shared-mysql --tail 20; exit 1; }
                sleep 1
              done
              for i in \$(seq 1 20); do
                docker exec shared-nginx nginx -t 2>/dev/null && { echo 'Nginx ready!'; break; }
                [ \$i -eq 20 ] && { echo '::warning::Nginx not ready yet — continuing'; break; }
                sleep 2
              done
            fi
          "

      - name: "[INIT] Create DB + user"
        if: needs.build.outputs.mode == 'init'
        env:
          VIETNET_DB_PASSWORD: ${{ secrets.VIETNET_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          printf "CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\nCREATE USER IF NOT EXISTS 'vietnet'@'%%' IDENTIFIED BY '%s';\nGRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%%';\nFLUSH PRIVILEGES;\n" "$VIETNET_DB_PASSWORD" > /tmp/create_vietnet.sql
          sshpass -e scp -P $PORT /tmp/create_vietnet.sql $VPS:/tmp/create_vietnet.sql
          rm -f /tmp/create_vietnet.sql
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker cp /tmp/create_vietnet.sql shared-mysql:/tmp/create_vietnet.sql
            docker exec shared-mysql bash -c 'MYSQL_PWD=\"\$MYSQL_ROOT_PASSWORD\" mysql -u root < /tmp/create_vietnet.sql' 2>&1
            docker exec shared-mysql rm -f /tmp/create_vietnet.sql
            rm -f /tmp/create_vietnet.sql
          "

      - name: "[INIT] SSL placeholder cert"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            CERT_VALID=\$(\$DC run --rm --entrypoint '' certbot sh -c \
              'openssl x509 -in /etc/letsencrypt/live/bhquan.store/fullchain.pem -noout -checkend 3600 2>/dev/null && echo yes || echo no' \
              2>/dev/null || echo no)
            if [ \"\$CERT_VALID\" = 'no' ]; then
              echo 'Creating placeholder cert for bhquan.store...'
              \$DC run --rm --entrypoint '' certbot sh -c '
                mkdir -p /etc/letsencrypt/live/bhquan.store
                openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                  -keyout /etc/letsencrypt/live/bhquan.store/privkey.pem \
                  -out /etc/letsencrypt/live/bhquan.store/fullchain.pem \
                  -subj /CN=bhquan.store 2>/dev/null && echo Placeholder OK
              ' || echo '::error::Failed to create placeholder cert'
            else
              echo 'Cert still valid for bhquan.store'
            fi
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      - name: "[INIT] Build & Start services"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          echo "=== Building images ==="
          if ! sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend frontend 2>&1"; then
            echo "::error::Docker build failed"
            exit 1
          fi
          echo "=== Starting services ==="
          if ! sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d 2>&1"; then
            echo "::error::Docker start failed"
            sshpass -e ssh -p $PORT $VPS "
              export PATH=\$PATH:/usr/local/bin
              docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared' || true
              echo '--- vietnet-api logs ---'
              docker logs vietnet-api --tail 30 2>&1 || true
            "
            exit 1
          fi
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      - name: "[INIT] Get real SSL cert"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sleep 5
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            IS_REAL=\$(\$DC run --rm --entrypoint '' certbot sh -c '
              CERT=/etc/letsencrypt/live/bhquan.store/fullchain.pem
              [ ! -f \"\$CERT\" ] && echo no && exit 0
              openssl x509 -in \"\$CERT\" -noout -checkend 2592000 2>/dev/null || { echo no; exit 0; }
              openssl x509 -in \"\$CERT\" -noout -issuer 2>/dev/null | grep -qiE \"let.s encrypt|R3|R10|R11|E5|E6\" && echo yes || echo no
            ' 2>/dev/null || echo no)
            if [ \"\$IS_REAL\" = 'yes' ]; then
              echo 'LE cert valid for bhquan.store — skip'
            else
              echo 'Requesting LE cert for bhquan.store...'
              \$DC run --rm --entrypoint '' certbot sh -c '
                rm -rf /etc/letsencrypt/live/bhquan.store  /etc/letsencrypt/live/bhquan.store-*
                rm -rf /etc/letsencrypt/archive/bhquan.store /etc/letsencrypt/archive/bhquan.store-*
                rm -f  /etc/letsencrypt/renewal/bhquan.store.conf /etc/letsencrypt/renewal/bhquan.store-*.conf
              '
              if timeout 120 \$DC run --rm --entrypoint '' certbot \
                certbot certonly --webroot -w /var/www/certbot \
                --non-interactive --cert-name bhquan.store \
                --email admin@bhquan.site --agree-tos --no-eff-email \
                -d bhquan.store -d www.bhquan.store 2>&1; then
                echo 'LE cert OK for bhquan.store (with www.)'
              elif timeout 120 \$DC run --rm --entrypoint '' certbot \
                certbot certonly --webroot -w /var/www/certbot \
                --non-interactive --cert-name bhquan.store \
                --email admin@bhquan.site --agree-tos --no-eff-email \
                -d bhquan.store 2>&1; then
                echo 'LE cert OK for bhquan.store (without www.)'
              else
                echo '::warning::LE failed for bhquan.store — keeping placeholder cert'
              fi
              if docker inspect shared-nginx --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
                docker exec shared-nginx nginx -s reload 2>/dev/null && echo 'Nginx reloaded OK' || true
              fi
            fi
          " || true

      # ── INIT: Seed ───────────────────────────────
      - name: "[INIT] Seed database"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health" > /dev/null 2>&1; then
              break
            fi
            if [ $i -eq 30 ]; then echo "Backend not ready — skip seed"; exit 0; fi
            sleep 2
          done
          echo "Seeding (first-time only)..."
          sshpass -e ssh -p $PORT $VPS "
            cd ${APP_DIR}
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-admin.js 2>&1 || echo 'seed-admin: skipped (may exist)'
            docker compose -f docker-compose.prod.yml exec -T backend node dist/scripts/seed-data.js 2>&1 || echo 'seed-data: skipped (may exist)'
          "

      # ── UPDATE: Upload changed files ─────────────
      - name: "[UPDATE] Upload frontend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.fe == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/frontend/src"
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.js frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.js 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Upload backend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.be == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/backend/src"
          tar czf - backend/src backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Sync config"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/db"
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          sshpass -e scp -P $PORT -r db/schema $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: "[UPDATE] Sync nginx"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT nginx/conf.d/bhquan.store.conf $VPS:${INFRA_DIR}/nginx/conf.d/bhquan.store.conf
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            CERT_VALID=\$(\$DC run --rm --entrypoint '' certbot sh -c \
              'openssl x509 -in /etc/letsencrypt/live/bhquan.store/fullchain.pem -noout -checkend 3600 2>/dev/null && echo yes || echo no' \
              2>/dev/null || echo no)
            if [ \"\$CERT_VALID\" = 'no' ]; then
              echo 'Creating placeholder cert for bhquan.store...'
              \$DC run --rm --entrypoint '' certbot sh -c '
                mkdir -p /etc/letsencrypt/live/bhquan.store
                openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                  -keyout /etc/letsencrypt/live/bhquan.store/privkey.pem \
                  -out /etc/letsencrypt/live/bhquan.store/fullchain.pem \
                  -subj /CN=bhquan.store 2>/dev/null
              ' || true
            fi
            echo '--- nginx config test ---'
            docker exec shared-nginx nginx -t 2>&1 || true
            if docker inspect shared-nginx --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
              docker exec shared-nginx nginx -s reload 2>/dev/null && echo 'Nginx reloaded OK' || echo '::warning::nginx reload failed'
              sleep 3
              NGINX_STATUS=\$(docker inspect shared-nginx --format '{{.State.Status}}' 2>/dev/null || echo missing)
              if [ \"\$NGINX_STATUS\" != 'running' ]; then
                echo '::error::shared-nginx not running after config update (status='\$NGINX_STATUS')'
                docker logs shared-nginx --tail 20 2>&1 || true
                docker run --rm \
                  -v ${INFRA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
                  -v ${INFRA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro \
                  -v shared_certbot_data:/etc/letsencrypt:ro \
                  nginx:1.27-alpine nginx -t 2>&1 || true
                exit 1
              fi
              echo 'nginx: OK'
            else
              echo '::warning::shared-nginx not running — skip reload'
            fi
          "

      - name: "[UPDATE] Sync infra"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.infra == 'true'
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/
          sshpass -e scp -P $PORT infra/nginx/nginx.conf $VPS:${INFRA_DIR}/nginx/nginx.conf
          printf "MYSQL_ROOT_PASSWORD='%s'\n" "$MYSQL_ROOT_PASSWORD" > /tmp/infra_update.env
          sshpass -e scp -P $PORT /tmp/infra_update.env $VPS:${INFRA_DIR}/.env
          sshpass -e ssh -p $PORT $VPS "chmod 600 ${INFRA_DIR}/.env"
          rm -f /tmp/infra_update.env
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker network create webphoto_backend 2>/dev/null || true
            docker network create vietnet_frontend 2>/dev/null || true
            docker pull nginx:1.27-alpine 2>&1 | tail -1
            cd ${INFRA_DIR} && docker compose up -d --force-recreate 2>&1 | tail -5
            for i in \$(seq 1 60); do
              docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              [ \$i -eq 60 ] && { docker logs shared-mysql --tail 20; exit 1; }
              sleep 1
            done
          "

      - name: "[UPDATE] Rebuild backend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.be == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend 2>&1")
          if [ $? -ne 0 ]; then echo "::error::Backend build failed"; echo "$BUILD_OUT" | tail -30; exit 1; fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d backend"

      - name: "[UPDATE] Rebuild frontend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.fe == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          BUILD_OUT=$(sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build frontend 2>&1")
          if [ $? -ne 0 ]; then echo "::error::Frontend build failed"; echo "$BUILD_OUT" | tail -30; exit 1; fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d frontend"

      - name: "[UPDATE] Ensure nginx connected"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            docker network connect vietnet_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      # ── SHARED: Config + DB ──────────────────────
      - name: Sync .env
        env:
          VIETNET_DB_PASSWORD: ${{ secrets.VIETNET_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          grep -v '^\s*#' config/env | grep -v '^\s*$' > /tmp/prod.env
          printf 'VIETNET_DB_PASSWORD=%s\n' "$VIETNET_DB_PASSWORD" >> /tmp/prod.env
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> /tmp/prod.env
          printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> /tmp/prod.env
          printf 'REVALIDATE_SECRET=%s\n' "$REVALIDATE_SECRET" >> /tmp/prod.env
          printf 'CRON_SECRET=%s\n' "$CRON_SECRET" >> /tmp/prod.env
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT /tmp/prod.env $VPS:${APP_DIR}/.env
          sshpass -e ssh -p $PORT $VPS "chmod 600 ${APP_DIR}/.env && cp ${APP_DIR}/.env ${APP_DIR}/config/env"

      - name: Install crontab (idempotent)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/scripts"
          sshpass -e scp -P $PORT scripts/crontab.vietnet $VPS:${APP_DIR}/scripts/crontab.vietnet
          printf 'export CRON_SECRET=%s\n' "$CRON_SECRET" > /tmp/cron-env
          sshpass -e scp -P $PORT /tmp/cron-env $VPS:${APP_DIR}/.cron-env
          rm -f /tmp/cron-env
          sshpass -e ssh -p $PORT $VPS "
            chmod 600 ${APP_DIR}/.cron-env
            if [ ! -f /etc/cron.d/vietnet ]; then
              if cp ${APP_DIR}/scripts/crontab.vietnet /etc/cron.d/vietnet 2>/dev/null; then
                chmod 644 /etc/cron.d/vietnet
                chown root:root /etc/cron.d/vietnet 2>/dev/null || true
                echo 'Crontab installed: /etc/cron.d/vietnet'
                ls -la /etc/cron.d/vietnet
              else
                echo '::warning::Cannot write /etc/cron.d/vietnet — manual install needed:'
                echo '  sudo cp ${APP_DIR}/scripts/crontab.vietnet /etc/cron.d/vietnet && sudo chmod 644 /etc/cron.d/vietnet'
              fi
            else
              echo 'Crontab already exists — skip (/etc/cron.d/vietnet)'
              ls -la /etc/cron.d/vietnet
            fi
          "

      - name: Ensure DB + user
        env:
          VIETNET_DB_PASSWORD: ${{ secrets.VIETNET_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          MYSQL_STATUS=$(sshpass -e ssh -p $PORT $VPS "docker ps --filter name=shared-mysql --format '{{.Names}}'" 2>&1)
          [ -z "$MYSQL_STATUS" ] && { echo "::warning::shared-mysql not running — skip"; exit 0; }
          printf "CREATE DATABASE IF NOT EXISTS vietnet CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\nCREATE USER IF NOT EXISTS 'vietnet'@'%%' IDENTIFIED BY '%s';\nGRANT ALL PRIVILEGES ON *.* TO 'vietnet'@'%%';\nFLUSH PRIVILEGES;\n" "$VIETNET_DB_PASSWORD" > /tmp/ensure_vietnet.sql
          sshpass -e scp -P $PORT /tmp/ensure_vietnet.sql $VPS:/tmp/ensure_vietnet.sql
          rm -f /tmp/ensure_vietnet.sql
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker cp /tmp/ensure_vietnet.sql shared-mysql:/tmp/ensure_vietnet.sql
            docker exec shared-mysql bash -c 'MYSQL_PWD=\"\$MYSQL_ROOT_PASSWORD\" mysql -u root < /tmp/ensure_vietnet.sql' 2>&1
            docker exec shared-mysql rm -f /tmp/ensure_vietnet.sql
            rm -f /tmp/ensure_vietnet.sql
          "

      - name: Ensure DB schema
        if: needs.build.outputs.db == 'true'
        env:
          VIETNET_DB_PASSWORD: ${{ secrets.VIETNET_DB_PASSWORD }}
        run: |
          set +e
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          printf '%s' "$VIETNET_DB_PASSWORD" > /tmp/vietnet_db_pass.txt
          sshpass -e scp -P $PORT /tmp/vietnet_db_pass.txt $VPS:/tmp/vietnet_db_pass.txt
          rm -f /tmp/vietnet_db_pass.txt
          MYSQL_CMD="MYSQL_PWD=\$(cat /tmp/vietnet_db_pass.txt) docker exec -i -e MYSQL_PWD shared-mysql mysql -u vietnet vietnet"
          TABLES_ORDER=(users login_attempts refresh_tokens password_reset_tokens categories media projects project_gallery articles products product_images consultations page_configs page_config_history settings notifications page_views page_view_daily email_logs app_logs)
          for tbl in "${TABLES_ORDER[@]}"; do
            FILE="db/schema/tables/${tbl}.sql"
            [ ! -f "$FILE" ] && continue
            sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$FILE" 2>&1 || true
          done
          sshpass -e ssh -p $PORT $VPS "rm -f /tmp/vietnet_db_pass.txt"

      - name: Run DB changelog
        env:
          VIETNET_DB_PASSWORD: ${{ secrets.VIETNET_DB_PASSWORD }}
        run: |
          set +e
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          [ ! -d "db/changelog" ] && exit 0
          printf '%s' "$VIETNET_DB_PASSWORD" > /tmp/vietnet_db_pass.txt
          sshpass -e scp -P $PORT /tmp/vietnet_db_pass.txt $VPS:/tmp/vietnet_db_pass.txt
          rm -f /tmp/vietnet_db_pass.txt
          MYSQL_CMD="MYSQL_PWD=\$(cat /tmp/vietnet_db_pass.txt) docker exec -i -e MYSQL_PWD shared-mysql mysql -u vietnet vietnet"

          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null | sort); do
            sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1 || true
          done

          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")
          PASS=0; SKIP=0; FAIL=0
          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f"); KEY="${VER}/${FNAME}"
              echo "$APPLIED" | grep -qF "$KEY" && { ((SKIP++)); continue; }
              echo -n "  $FNAME ... "
              OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
              if [ $? -eq 0 ]; then
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//;s/\.sql$//;s/_/ /g')
                CHECKSUM=$(sha256sum "$f" | cut -d' ' -f1)
                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"REPLACE INTO schema_changelog (version,filename,description,applied_by,checksum) VALUES ('$VER','$FNAME','$DESC','ci','$CHECKSUM')\"" 2>/dev/null
                echo "OK"; ((PASS++))
              else
                echo "FAILED"; echo "$OUTPUT" | tail -3 | sed 's/^/    /'; ((FAIL++))
              fi
            done
          done
          sshpass -e ssh -p $PORT $VPS "rm -f /tmp/vietnet_db_pass.txt"
          echo "Changelog: $PASS applied, $SKIP skipped, $FAIL failed"

      - name: Restart after DB changes
        if: needs.build.outputs.db == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml restart backend frontend" 2>&1 || true
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health" > /dev/null 2>&1; then
              echo "Backend ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Backend not ready after 60s post-migration"
              sshpass -e ssh -p $PORT $VPS "docker logs vietnet-api --tail 30" 2>&1 || true
              exit 1
            fi
            sleep 2
          done

  # ─── STAGE 4: VERIFY ────────────────────────────
  verify:
    name: "4. Health Check"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Ensure Redis noeviction
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            POLICY=\$(docker exec shared-redis redis-cli CONFIG GET maxmemory-policy 2>/dev/null | tail -1)
            if [ \"\$POLICY\" != 'noeviction' ]; then
              docker exec shared-redis redis-cli CONFIG SET maxmemory-policy noeviction
              docker exec shared-redis redis-cli CONFIG REWRITE 2>/dev/null || true
              echo 'Redis policy fixed to noeviction'
            else
              echo 'Redis: noeviction OK'
            fi
          "

      - name: Wait + Backend health
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sleep 10
          for i in $(seq 1 15); do
            if RESULT=$(sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4100/api/health" 2>/dev/null) && [ -n "$RESULT" ]; then
              echo "Backend: OK — $RESULT"
              exit 0
            fi
            echo "  Attempt $i/15..."
            if [ $i -eq 15 ]; then
              echo "::error::Backend health check failed after 40s"
              sshpass -e ssh -p $PORT $VPS "
                export PATH=\$PATH:/usr/local/bin
                docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'vietnet|shared' || true
                echo '---'
                docker logs vietnet-api --tail 20 2>&1 || true
              " 2>&1 || true
              exit 1
            fi
            sleep 2
          done

      - name: Verify cron endpoints
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            if [ ! -f ${APP_DIR}/.cron-env ]; then
              echo '::error::.cron-env missing — Install crontab step may have failed'
              exit 1
            fi
            source ${APP_DIR}/.cron-env
            FAIL=0
            for ep in publish-scheduled traffic-sync cleanup-sessions cleanup-orphan-media; do
              HTTP=\$(curl -s -o /tmp/cron_resp -w '%{http_code}' -X POST \
                -H \"x-cron-secret: \$CRON_SECRET\" \
                http://127.0.0.1:4100/api/cron/\$ep 2>/dev/null)
              BODY=\$(cat /tmp/cron_resp 2>/dev/null | head -c 300)
              if [ \"\$HTTP\" = '200' ] || [ \"\$HTTP\" = '201' ]; then
                echo \"  OK   /api/cron/\$ep -> \$HTTP\"
              else
                echo \"  FAIL /api/cron/\$ep -> HTTP \$HTTP\"
                echo \"       Body: \$BODY\"
                FAIL=1
              fi
            done
            rm -f /tmp/cron_resp
            if [ \$FAIL -eq 1 ]; then
              echo '::error::Cron smoke test failed — checking API logs for details'
              docker logs vietnet-api --tail 30 2>&1 | grep -iE 'cron|error|warn|route|404|exception' | head -15 || true
              echo '--- Registered routes (cron) ---'
              curl -sf http://127.0.0.1:4100/api 2>/dev/null | head -c 500 || true
              exit 1
            fi
            echo 'Cron smoke test: all 4 endpoints OK'
            echo '--- /etc/cron.d/vietnet status ---'
            ls -la /etc/cron.d/vietnet 2>/dev/null || echo 'WARNING: /etc/cron.d/vietnet not found'
          "

      - name: Frontend health
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          for i in $(seq 1 10); do
            if sshpass -e ssh -p $PORT $VPS "curl -sf -o /dev/null http://localhost:3100" 2>/dev/null; then
              echo "Frontend: OK"
              exit 0
            fi
            if [ $i -eq 10 ]; then
              echo "::error::Frontend health check failed"
              sshpass -e ssh -p $PORT $VPS "docker logs vietnet-frontend --tail 20" 2>&1 || true
              exit 1
            fi
            sleep 2
          done

      - name: SSL cert status
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          CERT_INFO=$(sshpass -e ssh -p $PORT $VPS "
            docker compose -f ${INFRA_DIR}/docker-compose.yml run --rm --entrypoint '' certbot sh -c '
              CERT=/etc/letsencrypt/live/bhquan.store/fullchain.pem
              [ ! -f \$CERT ] && echo MISSING && exit 0
              ISSUER=\$(openssl x509 -in \$CERT -noout -issuer 2>/dev/null)
              echo \$ISSUER | grep -qiE \"let.s encrypt|R3|R10|R11|E5|E6\" && echo REAL || echo PLACEHOLDER
            '
          " 2>&1)
          echo "SSL cert bhquan.store: $CERT_INFO"

      - name: Deploy summary
        run: |
          echo "=========================================="
          echo "  VietNet — bhquan.store"
          echo "  Mode: ${{ needs.build.outputs.mode }}"
          echo "  FE: ${{ needs.build.outputs.fe }} | BE: ${{ needs.build.outputs.be }}"
          echo "  DB: ${{ needs.build.outputs.db }} | Infra: ${{ needs.build.outputs.infra }}"
          echo "=========================================="
